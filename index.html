<!DOCTYPE html>
<html>

<head>
    <title>SOUP HANDS</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }


        .buttonWrap{
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);

    display:flex;
    justify-content:center;
}


        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #FFFDF8, #FFF4E6);
            margin-top: 60px;
            color:#222;
        }

        /* ---------------- HEADER ---------------- */

        #handshakeBtn{

    background:#7a4a2d;  /* brown */

    color:white;

    font-size:18px;

    font-family:"Courier New", monospace;

    letter-spacing:2px;

    padding:14px 30px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    box-shadow:0 10px 25px rgba(122,74,45,0.35);

    transition: all 0.2s ease;
}

#handshakeBtn:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 30px rgba(122,74,45,0.5);
}

#handshakeBtn:active{
    transform:translateY(1px);
}

        h1{
            font-size:60px;
            font-family:"Courier New", monospace;
            color:#ff9800;
            text-align:center;
            letter-spacing:5px;

            animation: floatTitle 3s ease-in-out infinite;
        }

        @keyframes floatTitle{
            0%{ transform: translateY(0); }
            50%{
                transform: translateY(-6px);
                text-shadow: 0 0 20px rgba(255,140,0,0.4);
            }
            100%{ transform: translateY(0); }
        }

        h2{
            text-align:center;
            font-family: monospace;
            font-size:18px;
            color:rgba(122,74,45,0.35);
            margin-top:8px;
        }

        h2::after{
            content:"";
            animation:dots 1.5s infinite;
        }

        @keyframes dots{
            0%{content:"";}
            33%{content:".";}
            66%{content:"..";}
            100%{content:"...";}
        }

        /* ---------------- CONTAINER ---------------- */

        .container {
            position: relative;
            width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }

        #hand {
            width: 100%;
            display: block;
            user-select: none;
            pointer-events: none;
        }

        /* ---------------- SENSOR BOX ---------------- */

        .sensor {
            position: absolute;
            width: 80px;
            height: 80px;

            background: rgba(0, 255, 0, 0.5);

            border: 2px solid white;

            cursor: grab;

            resize: both;
            overflow: auto;

            border-radius: 8px;

            box-shadow: 0 8px 20px rgba(0,0,0,0.15);

            transition: background-color 0.2s ease;
        }

        .sensor:active {
            cursor: grabbing;
        }

        /* initial positions */

        #sensor1 { top: 450px; left: 100px; }
        #sensor2 { top: 200px; left: 300px; }
        #sensor3 { top: 350px; left: 500px; }
        #sensor4 { top: 150px; left: 650px; }

    </style>
</head>

<body>

<h1>SOUP HANDS</h1>
<h2>long distance handshakes at the end of the world...</h2>

<div class="container">

    <img id="hand"
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8gUoKCZA7wYE2ZOa-MmyfsCaMMQx-iIXf0rgs1GQ766JnCnYVfn_kll8&s=10">

    <div id="sensor1" class="sensor"></div>
    <div id="sensor2" class="sensor"></div>
    <div id="sensor3" class="sensor"></div>
    <div id="sensor4" class="sensor"></div>

</div>

<div class="buttonWrap">

    <button id="handshakeBtn">
        SEND HANDSHAKE
    </button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

/* ---------------- COLOR LOGIC ---------------- */

socket.on("sensor", data => {

    let color = "gray";

    const category = Number(data.category);
    const sensor = Number(data.sensor);

    if (category === 0)
        color = "rgba(255,255,0,0.6)";   // yellow

    else if (category === 1)
        color = "rgba(255,165,0,0.6)";   // orange

    else
        color = "rgba(255,80,50,0.6)";   // red

    const box = document.getElementById("sensor" + sensor);

    if (box) box.style.backgroundColor = color;

});

/* ---------------- DRAG FUNCTION (UNCHANGED LOGIC) ---------------- */

function makeDraggable(el) {

    let offsetX, offsetY, dragging = false;

    el.addEventListener("mousedown", (e) => {

        dragging = true;

        offsetX = e.clientX - el.offsetLeft;
        offsetY = e.clientY - el.offsetTop;

    });

    document.addEventListener("mousemove", (e) => {

        if (!dragging) return;

        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";

    });

    document.addEventListener("mouseup", () => {

        dragging = false;

    });

}

/* enable dragging */

makeDraggable(document.getElementById("sensor1"));
makeDraggable(document.getElementById("sensor2"));
makeDraggable(document.getElementById("sensor3"));
makeDraggable(document.getElementById("sensor4"));


document.getElementById("handshakeBtn").addEventListener("click", () => {
    socket.emit("handshake", {
        time: Date.now()
    });

    console.log("HANDSHAKE SENT");
});
</script>

</body>
</html>
