<!DOCTYPE html>
<html>

<head>
    <title>SOUP HANDS</title>

    <style>
        h1 {
            font-size: 50px;
            font-family: 'Courier New', Courier, monospace;
            color: orange;
            text-align: center;

        }
        body {
            margin: 0;
            font-family: Arial;
            background: white;
            color: white;
            margin-top: 100px;
        }

        .container {
            position: relative;
            width: 900px;
            margin: 40px auto;
        }

        #hand {
            width: 100%;
            display: block;
            user-select: none;
            pointer-events: none;
        }

        /* SENSOR BOX */
        .sensor {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 0, 0.5);
            border: 2px solid white;
            cursor: grab;
            resize: both;
            overflow: auto;
        }

        .sensor:active {
            cursor: grabbing;
        }

        #sensor1 { top: 450px; left: 100px; }
        #sensor2 { top: 200px; left: 300px; }
    </style>
</head>

<body>

<h1><bold>SOUP HANDS</bold></h1>

<h2 style="text-align:center;">soup-hands</h2>

<div class="container">

    <img id="hand"
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8gUoKCZA7wYE2ZOa-MmyfsCaMMQx-iIXf0rgs1GQ766JnCnYVfn_kll8&s=10">

    <div id="sensor1" class="sensor"></div>
    <div id="sensor2" class="sensor"></div>
    <div id="sensor3" class="sensor"></div>
    <div id="sensor4" class="sensor"></div>


</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// ---- LIVE COLOR UPDATES ----
socket.on("sensor", data => {

    let color = "gray";

    const category = Number(data.category);
    const sensor = Number(data.sensor);

    if (category === 0) color = "rgba(0,255,0,0.6)";
    else if (category === 1) color = "rgba(255,255,0,0.6)";
    else color = "rgba(255,0,0,0.6)";

    const box = document.getElementById("sensor" + sensor);
    if (box) box.style.backgroundColor = color;
});


// ---- DRAG FUNCTION ----
function makeDraggable(el) {
    let offsetX, offsetY, dragging = false;

    el.addEventListener("mousedown", (e) => {
        dragging = true;
        offsetX = e.clientX - el.offsetLeft;
        offsetY = e.clientY - el.offsetTop;
    });

    document.addEventListener("mousemove", (e) => {
        if (!dragging) return;
        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", () => {
        dragging = false;
    });
}

// enable dragging
makeDraggable(document.getElementById("sensor1"));
makeDraggable(document.getElementById("sensor2"));
makeDraggable(document.getElementById("sensor3"));
makeDraggable(document.getElementById("sensor4"));

</script>

</body>
</html>
